name: Android Release

# Triggered by the one-command release script (scripts/release-android.mjs), which pushes
# a v* tag. Builds a SIGNED APK + AAB and publishes them as a GitHub Release. The app reads
# /releases/latest to power the in-app update popup.

on:
  push:
    tags:
      - "v*"
  # Manual re-run from the Actions tab (e.g. after fixing a secret). Builds the current commit;
  # only a tag push publishes a versioned Release.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # >=22 is a hard requirement of the Capacitor CLI ("cap sync" aborts on 20).
          node-version: 22
          cache: npm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Capacitor sync (bakes the production web URL into the shell)
        run: npx cap sync android
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Write google-services.json (if provided as a secret)
        env:
          FIREBASE_GOOGLE_SERVICES: ${{ secrets.FIREBASE_GOOGLE_SERVICES }}
        run: |
          if [ -n "$FIREBASE_GOOGLE_SERVICES" ]; then
            echo "$FIREBASE_GOOGLE_SERVICES" > android/app/google-services.json
            echo "Wrote google-services.json from secret."
          elif [ -f android/app/google-services.json ]; then
            echo "Using committed google-services.json."
          else
            echo "::warning::No google-services.json — the build will succeed but push won't work."
          fi

      - name: Decode keystore + write signing config
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/rentmaster-release.jks
          cat > android/keystore.properties <<EOF
          storeFile=../rentmaster-release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Build signed APK + AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Publish GitHub Release
        # Only a tag push publishes a versioned Release; a manual dispatch just builds/validates.
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # tag_name/name come from the pushed tag; body from the notes the release script wrote.
          body_path: RELEASE_NOTES.md
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab
